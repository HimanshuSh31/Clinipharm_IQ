services:
  pharmacy:
    build: .
    container_name: pharmasystem
    ports:
      - "8501:8501"
    volumes:
      # Persist the SQLite database and uploaded images outside the container
      - ./drug_data.db:/app/drug_data.db
      - ./images:/app/images
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
